name: Test Build Artifacts

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target platform"
        type: choice
        required: true
        default: all
        options:
          - all
          - macos
          - windows
          - linux

env:
  TEST_RELEASE_TAG: test-build-${{ github.run_id }}
  TEST_RELEASE_NAME: Test Build ${{ github.run_number }}

jobs:
  prepare-test-release:
    name: Prepare test draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TEST_RELEASE_TAG }}
          name: ${{ env.TEST_RELEASE_NAME }}
          draft: true
          prerelease: true
          generate_release_notes: false
          body: |
            Automated test build artifacts from workflow `${{ github.workflow }}`.
            Triggered by `${{ github.actor }}` on `${{ github.ref_name }}`.

  build-macos-test:
    name: Build macOS test DMG
    needs: prepare-test-release
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'macos' }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS package
        run: bash scripts/package_macos_pyqt.sh

      - name: Upload macOS test asset to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TEST_RELEASE_TAG }}
          files: dist/Rockchip-Flash-Tool-macOS-universal.dmg
          draft: true
          prerelease: true

  build-windows-test:
    name: Build Windows test EXE
    needs: prepare-test-release
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'windows' }}
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows package
        shell: pwsh
        run: ./scripts/package_windows_pyqt.ps1

      - name: Upload Windows test asset to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TEST_RELEASE_TAG }}
          files: dist/Rockchip-Flash-Tool-windows-x64.zip
          draft: true
          prerelease: true

  build-linux-test:
    name: Build Linux test AppImage
    needs: prepare-test-release
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'linux' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache linuxdeploy
        uses: actions/cache@v4
        with:
          path: .cache
          key: linuxdeploy-${{ runner.os }}-x86_64

      - name: Install Linux runtime deps for bundling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libfuse2 \
            libgbm1 \
            libopengl0 \
            patchelf \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xkb1 \
            libxcb-util1 \
            libxcb-image0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0

      - name: Build Linux package
        run: bash scripts/package_linux_pyqt.sh

      - name: Upload Linux test asset to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TEST_RELEASE_TAG }}
          files: dist/Rockchip-Flash-Tool-linux-x86_64.AppImage
          draft: true
          prerelease: true

name: Build And Release

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: Build macOS universal DMG
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS package
        run: bash scripts/package_macos_pyqt.sh

      - name: Upload macOS release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Rockchip-Flash-Tool-macOS-universal.dmg
          generate_release_notes: true

  build-windows:
    name: Build Windows EXE
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows package
        shell: pwsh
        run: ./scripts/package_windows_pyqt.ps1

      - name: Upload Windows release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Rockchip-Flash-Tool-windows-x64.zip
          generate_release_notes: false

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux runtime deps for bundling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xkb1 \
            libxcb-util1 \
            libxcb-image0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0

      - name: Build Linux package
        run: bash scripts/package_linux_pyqt.sh

      - name: Upload Linux release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Rockchip-Flash-Tool-linux-x86_64.AppImage
          generate_release_notes: false
